<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> PROJECT </title>
<style>
body {    
    background: #000016;    
}
#Lista {
    gap: 12px;
    padding: 0px;  
    display: grid;
    list-style: none;
    font-weight: bold;    
    grid-template-columns: repeat(2, 1fr);
}
#Lista li {
    margin-left: 5vh;
    color: gold;
    width: 13vh;
    height: 13vh;
    display: flex;
    background: #001;    
    border-radius: 20px;    
    align-items: center;
    justify-content: center;    
   
   &:hover {
     color: #4f9;
 }
}
a {
    color: inherit; 
 /* Hereda El Color Del Padre */
    cursor: none;
    text-decoration: none;
}
#F {
    width: 100%;
    height: 30vh;
    margin-top: 3vh;
    aspect-ration: 6/19;
    border-radius: 20px;
    border: .5px solid #aaa;
    background: url(https://is.gd/DSiGA7);
    background-size: cover;
    background-position: center;
}
#H {
    color: gray;
}
</style>
</head>
<body>
<center>
    <iframe id="F" src="" frameborder="1" allowfullscreen="true" allow="encrypted-media" allow="autoplay"></iframe>    
        
      <h4 id="H">2026</h4>
       <ul id="Lista"></ul>
              
</center>
<script>
 var CH = [
  {name: "OBSESION", url: "https://www.dropbox.com/scl/fi/5y6v4vv7sl60oqxlcg6lz/Obsesi-n.mp4?rlkey=fh5r7o498jbpu1jf0ie0t6tr4&st=6fvyl3wj&dl=0"}, 
  {name: "MINIONS", url: "https://www.dropbox.com/scl/fi/c3hvejbe2120x7emqxo6b/Minions-Monstruos.mp4?rlkey=f9qs278hdtx9plih7xs92bpfn&st=h14p7yjv&dl=0"},
  {name: "DEMON SLAYER", url: "https://www.dropbox.com/scl/fi/vh1j78i85ksyxqqe294yf/Demon-Slayer-Kimetsu-no-Yaiba-Castillo-infinito.mp4?rlkey=stfzsvu6b0awcjronnssm7rv3&st=jip0swdp&dl=0"}, 
  {name: "TOY STORY 5", url: "https://www.dropbox.com/scl/fi/p23u9ohnv6h61jodt1508/Toy-Story-5.mp4?rlkey=m6q4ln25wj9wn6xsoql9m5jhg&st=sqfllynh&dl=0"}
 ];

 CH.forEach(canal => {
    let li = document.createElement('li');
    li.innerHTML = `<a class="DATA" href="${canal.url}">${canal.name}</a>`;
    Lista.appendChild(li);  
 });


    var LIST = document.querySelectorAll('#Lista li');
    
 LIST.forEach(lis => {
   lis.onclick = (e) => {    
     e.preventDefault();  
       LIST.forEach(other => {
   other.style.border = '';
  other.style.color = 'gold'; 
  other.style.background = '#001';
      });
 var Enlace = e.target.href;
 var Titulo = e.target.textContent;
     lis.style.color = '#4f3';
  lis.style.background = '#000';
lis.style.borderTop = '1px solid #4f3';
lis.style.borderBottom = '.1px solid #4f3';
   
   if (Enlace.includes('dropbox.com')) {
         var URL = Enlace.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        F.src = URL;
      } else {
          F.src = Enlace;
      }
        H.textContent = Titulo;
    }
 })
</script>
</body>
</html>
