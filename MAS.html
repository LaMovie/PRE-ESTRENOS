<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> PROJECT </title>
<style>
body {    
    background: #000016;    
}
#Lista {
    gap: 12px;
    padding: 0px;  
    display: grid;
    list-style: none;
    font-weight: bold;    
    grid-template-columns: repeat(3, 1fr);
}
#Lista li {
    margin-left: 0vh;
    color: gold;
    width: 13vh;
    height: 13vh;
    display: flex;
    background: #001;    
    border-radius: 20px;    
    align-items: center;
    justify-content: center;    
   
   &:hover {
     color: #4f9;
 }
}
a {
    color: inherit; 
 /* Hereda El Color Del Padre */
    cursor: none;
    text-decoration: none;
}
#F {
    width: 100%;
    height: 30vh;
    margin-top: 3vh;
    aspect-ration: 6/19;
    border-radius: 20px;
    border: .5px solid #aaa;
    background: url(https://is.gd/DSiGA7);
    background-size: cover;
    background-position: center;
}
#H {
    color: gray;
}
</style>
</head>
<body>
<center>
    <iframe id="F" src="" frameborder="1" allowfullscreen="true" allow="encrypted-media" allow="autoplay"></iframe>    
        
      <h4 id="H">2026</h4>
       <ul id="Lista"></ul>
              
</center>
<script>
 var CH = [
  {name: "OBSESION", url: "https://www.dropbox.com/scl/fi/5y6v4vv7sl60oqxlcg6lz/Obsesi-n.mp4?rlkey=fh5r7o498jbpu1jf0ie0t6tr4&st=6fvyl3wj&dl=0"}, 
  {name: "MINIONS & MONSTRUOS", url: "https://www.dropbox.com/scl/fi/ebasi1pbgaar8j6988xp3/Minions-Monstruos-Copy.mp4?rlkey=p2smir7ajxptvpwemkch7e0kc&st=jsubxuqa&dl=0"}, 
  {name: "TOY STORY 5", url: "https://www.dropbox.com/scl/fi/3qwctxt54a73f8rj9h0so/Toy-Story-5-Copy.mp4?rlkey=wteopugxf2skd5yd8mnte6ibi&st=dyk5xqmi&dl=0"}
 ];

 CH.forEach(canal => {
    let li = document.createElement('li');
    li.innerHTML = `<a class="DATA" href="${canal.url}">${canal.name}</a>`;
    Lista.appendChild(li);  
 });


    var LIST = document.querySelectorAll('#Lista li');
    
 LIST.forEach(lis => {
   lis.onclick = (e) => {    
     e.preventDefault();  
       LIST.forEach(other => {
   other.style.border = '';
  other.style.color = 'gold'; 
  other.style.background = '#001';
      });
 var Enlace = e.target.href;
 var Titulo = e.target.textContent;
     lis.style.color = '#4f3';
  lis.style.background = '#000';
lis.style.borderTop = '1px solid #4f3';
lis.style.borderBottom = '.1px solid #4f3';
   
   if (Enlace.includes('dropbox.com')) {
         var URL = Enlace.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        F.src = URL;
        
      } else if (Titulo.includes('🔗')) {
   Titulo = '⏳Espere...';  
   e.target.textContent = Titulo; 
  window.location.href = Enlace;
          
      } else {
          F.src = Enlace;
      }
        H.textContent = Titulo;
    }
 })
</script>
</body>
</html>
