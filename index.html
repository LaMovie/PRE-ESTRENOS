<script>
  List.onclick = (event) => {
      
      const targetLink = event.target.closest('a');
      
      if (targetLink) {
     event.preventDefault(); 
        
   const ENLACE = targetLink.href;
        
        const elemento = targetLink.parentElement; 
  
   if (ENLACE.includes('file')) {
          var URL = ENLACE.split('view?usp')[0];
      var PRE = 'preview';
    Pantalla.src = URL + PRE; 
          AA.play();
        } else if (ENLACE.includes('.mp4')) {
    Pantalla.src = ENLACE;
        } else {
   window.location.href = ENLACE;          
        } 
        
        Leyenda.textContent = targetLink.textContent;
        
List.querySelectorAll('li').forEach(li => {
            li.classList.remove('Active');
        });
             elemento.classList.add('Active');
      }
    };   
</script>    

     <!-- FULL SCREEN -->
<script>
var fullscreenButton = document.querySelector('#fullscreenButton');
var iframe = document.querySelector('iframe');

fullscreenButton.addEventListener('click', function() {
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  } else if (iframe.mozRequestFullScreen) { 
    iframe.mozRequestFullScreen();
  } else if (iframe.webkitRequestFullscreen) { 
    iframe.webkitRequestFullscreen();
  } else if (iframe.msRequestFullscreen) { 
    iframe.msRequestFullscreen();
  }
});

document.addEventListener('fullscreenchange', function() {
  if (document.fullscreenElement) {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape');
    }
  } else {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait');
    }
  }
});
</script>

       <!-- texto -->
<script>
window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
           var textCapt = params.get('texto');
  
        if (textCapt) {
     var enlaces = document.querySelectorAll('#List li a');     
    
    enlaces.forEach(a => {
        if (a.textContent.trim().toLowerCase() === textCapt.trim().toLowerCase()) {
        a.click(); 
      }
    });
  }
});
</script>
